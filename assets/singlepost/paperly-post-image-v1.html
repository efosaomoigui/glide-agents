<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paperly – Post V1 · Image Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.15);
    --border: #1E1E1E;
    --text: #FFFFFF;
    --sz: 560px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#060606;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:48px 20px; gap:16px;
    font-family:'DM Sans',sans-serif;
  }
  .vtag {
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:4px;
    color:var(--gold); text-transform:uppercase;
    border:1px solid var(--gold-dim); padding:5px 14px;
  }

  .post {
    width:var(--sz); height:var(--sz);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
    background:#000; border:1px solid var(--border);
  }

  .post-img {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover; object-position:center 20%;
    opacity:0.78;
  }

  .overlay {
    position:absolute; inset:0;
    background: linear-gradient(
      108deg,
      rgba(8,8,8,0.98) 0%,
      rgba(8,8,8,0.95) 26%,
      rgba(8,8,8,0.76) 46%,
      rgba(8,8,8,0.28) 66%,
      transparent 100%
    );
    z-index:1;
  }
  .overlay-btm {
    position:absolute; bottom:0; left:0; right:0; height:210px;
    background:linear-gradient(to top, rgba(6,6,6,1) 0%, rgba(6,6,6,0.55) 55%, transparent 100%);
    z-index:1;
  }
  .grid-tex {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.011) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.011) 1px,transparent 1px);
    background-size:36px 36px;
    z-index:2; pointer-events:none;
  }
  .accent-line {
    position:absolute; left:0; top:0; bottom:0; width:3px;
    background:linear-gradient(to bottom, var(--gold) 0%, rgba(201,168,76,0.05) 100%);
    z-index:3;
  }

  .content {
    position:relative; z-index:4;
    display:flex; flex-direction:column;
    height:100%;
    padding:38px 36px 38px 48px;
    width:64%;
  }

  .toprow {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:22px;
  }
  .sector {
    display:flex; align-items:center; gap:8px;
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px;
    color:var(--gold); text-transform:uppercase;
  }
  .live-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--gold); box-shadow:0 0 8px var(--gold);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.15}}
  .top-logo {
    font-family:'Playfair Display',serif; font-size:13px; font-weight:900;
    color:rgba(255,255,255,0.11); letter-spacing:1px;
  }
  .top-logo span { color:rgba(201,168,76,0.22); }

  .rule {
    height:1px;
    background:linear-gradient(90deg,var(--gold) 0%,rgba(201,168,76,0.06) 60%,transparent 100%);
    margin-bottom:28px; opacity:0.55;
  }

  .headline {
    font-family:'Playfair Display',serif; font-weight:900; font-size:39px;
    color:var(--text); line-height:1.1; letter-spacing:-0.7px;
    margin-bottom:20px; flex-shrink:0;
    text-shadow:0 2px 24px rgba(0,0,0,0.9);
  }

  .summary { flex:1; }
  .summary p {
    font-size:14.5px; color:rgba(255,255,255,0.58);
    line-height:1.72; text-shadow:0 1px 10px rgba(0,0,0,0.9);
  }

  .footer {
    padding-top:24px;
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex; flex-direction:column; gap:11px;
  }
  .footer-top {
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  .footer-logo {
    font-family:'Playfair Display',serif; font-size:27px; font-weight:900;
    color:var(--text); letter-spacing:-0.4px; line-height:1;
  }
  .footer-logo span { color:var(--gold); }
  .footer-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .footer-label {
    font-family:'DM Mono',monospace; font-size:8.5px; letter-spacing:2px;
    color:var(--gold); text-transform:uppercase; opacity:0.65;
  }
  .footer-src {
    font-family:'DM Mono',monospace; font-size:8px; letter-spacing:1px;
    color:rgba(255,255,255,0.18); text-transform:uppercase;
  }
  .footer-url {
    font-family:'DM Mono',monospace; font-size:9.5px; letter-spacing:2px;
    color:rgba(255,255,255,0.2);
    text-decoration:underline; text-underline-offset:3px;
    text-decoration-color:rgba(201,168,76,0.3);
  }
</style>
</head>
<body>
<div class="vtag">Version 1 · Dark Editorial · Image</div>
<div class="post">
  <img class="post-img" src="https://images.unsplash.com/photo-1575936123452-b67c3203c357?w=900&q=85" alt="news">
  <div class="overlay"></div>
  <div class="overlay-btm"></div>
  <div class="grid-tex"></div>
  <div class="accent-line"></div>
  <div class="content">
    <div class="toprow">
      <div class="sector"><div class="live-dot"></div>Security</div>
      <div class="top-logo">PAPERLY<span>.</span></div>
    </div>
    <div class="rule"></div>
    <div class="headline">Customs Officers Shoot Driver Dead in Osun State</div>
    <div class="summary">
      <p>NCS operatives allegedly killed a driver on Osogbo/Iwo Road, sparking public outrage and calls for accountability across Osun State.</p>
    </div>
    <div class="footer">
      <div class="footer-top">
        <div class="footer-logo">PAPERLY<span>.</span></div>
        <div class="footer-meta">
          <span class="footer-label">Daily Intelligence</span>
          <span class="footer-src">The Nation · Punch</span>
        </div>
      </div>
      <div class="footer-url">paperly.online</div>
    </div>
  </div>
</div>
</body>
</html>
