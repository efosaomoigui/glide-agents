services:
  glide-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: glide-agent:latest
    container_name: glide-agent
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CHROME_PATH=/usr/bin/google-chrome-stable
    volumes:
      - ./data:/app/data
      - ./memory:/app/memory
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
